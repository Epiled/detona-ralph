<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detona Ralph - Game</title>

    <link
      rel="shortcut icon"
      href="./src/assets/imgs/favicon.jpg"
      type="image/jpg"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./src/styles/reset.css" />
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>

  <body>
    <!-- Top menu with game status -->
    <header class="menu">
      <div class="menu__status" data-menu-time>
        <h2 class="menu__title">Time Left</h2>
        <p data-time>0</p>
      </div>
      <div class="menu__status" data-menu-score>
        <h2 class="menu__title">Your Score</h2>
        <p data-score>0</p>
      </div>
      <div class="menu__status menu__status--player" data-menu-player>
        <img
          class="menu__image"
          src="src/assets/imgs/player.png"
          width="101"
          height="87"
          alt=""
        />
        <span data-life>x3</span>
      </div>
    </header>

    <main class="container">
      <!-- Side menu with control options -->
      <div class="column">
        <div class="column__wrapper">
          <img
            class="column__image"
            src="src/assets/imgs/logo.png"
            alt=""
            width="1634"
            height="1346"
          />
          <div class="column__btns">
            <button class="column__btn" data-start>Iniciar</button>
            <button class="column__btn" data-btn-toggle="configuration">
              Configuração
            </button>
            <button class="column__btn" data-btn-toggle="ranking">
              Ranking
            </button>
          </div>
        </div>
      </div>

      <!-- Playable game area -->
      <div class="game">
        <div class="panel">
          <div class="panel__row">
            <div data-square class="panel__square" id="1"></div>
            <div data-square class="panel__square" id="2"></div>
            <div data-square class="panel__square" id="3"></div>
          </div>
          <div class="panel__row">
            <div data-square class="panel__square" id="4"></div>
            <div data-square class="panel__square" id="5"></div>
            <div data-square class="panel__square" id="6"></div>
          </div>
          <div class="panel__row">
            <div data-square class="panel__square" id="7"></div>
            <div data-square class="panel__square" id="8"></div>
            <div data-square class="panel__square" id="9"></div>
          </div>
        </div>

        <!-- Player name and score input -->
        <div class="game__wrapper" data-box-user>
          <div class="game__info">
            <h2 class="game__title">Infome seu apelido</h2>
            <div class="game__entry">
              <input class="game__ipt" type="text" data-name name="" id="" />
            </div>
            <button class="game__btn" data-save-score>Salvar Pontuação</button>
          </div>
        </div>

        <!-- Player Leaderboard -->
        <aside class="ranking" data-toggle="ranking" data-menu-open="false">
          <div class="ranking__wrapper">
            <div class="ranking__header">
              <span>Nome</span>
              <span>Pontuação</span>
            </div>

            <!-- Ranking display container -->
            <ol class="ranking__info" data-ranking></ol>

            <button class="ranking__btn" data-btn-toggle="ranking">
              Fechar Ranking
            </button>
          </div>
        </aside>

        <!-- Sound controls -->
        <aside
          class="configuration"
          data-toggle="configuration"
          data-menu-open="false"
        >
          <div class="configuration__wrapper">
            <label for="music">
              Música
              <input
                class="configuration__ipt"
                type="range"
                name="music"
                id="music"
                min="0"
                max="1"
                value="0.5"
                step="any"
                data-music
              />
            </label>

            <label for="effects">
              Efeitos
              <input
                class="configuration__ipt"
                type="range"
                name="effects"
                id="effects"
                min="0"
                max="1"
                value="0.5"
                step="any"
                data-sound
              />
            </label>

            <button class="configuration__btn" data-btn-toggle="configuration">
              Salvar Configuração
            </button>
          </div>
        </aside>

        <!-- End-game controls -->
        <aside class="endGame" data-endGame>
          <div class="endGame__wrapper">
            <h3 data-endGame-message>Seu tempo acabou!</h3>
            <p>sua pontuação atual é</p>
            <span data-endGame-score>0</span>

            <button class="endGame__btn" data-endGame-btn>Próxima Vida</button>
          </div>
        </aside>
      </div>
    </main>

    <script type="module" defer src="src/scripts/engine.js"></script>
    <script type="module" src="src/scripts/ranking.js"></script>
    <script type="module" src="src/scripts/menuGame.js"></script>
    <script type="module" src="src/scripts/endGame.js"></script>
    <script type="module" src="src/scripts/configGame.js"></script>
  </body>
</html>
